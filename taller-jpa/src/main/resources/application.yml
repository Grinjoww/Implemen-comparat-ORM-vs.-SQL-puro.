spring:
  main:
    web-application-type: none   # es un programa de consola, no una app web
    banner-mode: off

  datasource:
    url: jdbc:postgresql://localhost:5432/taller_db
    username: taller
    password: taller

  jpa:
    hibernate:
      ddl-auto: none            # la tabla 'productos' ya existe (creada en el taller JDBC)
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: warn
